name: HeySalad Wallet - iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

env:
  SECRETS_API: https://apple-pie-sk.heysalad.app
  BUNDLE_ID: app.saladhr.heysalad-wallet
  SCHEME: HeySaladWallet

jobs:
  build-simulator:
    name: Build (Simulator)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build for simulator
        run: |
          xcodebuild \
            -workspace ios/HeySaladWallet.xcworkspace \
            -scheme HeySaladWallet \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wallet-build-logs
          path: ~/Library/Logs/
          retention-days: 3

  build-release:
    name: Build & Upload to TestFlight
    runs-on: macos-14
    if: github.ref == 'refs/heads/main'
    needs: build-simulator
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Fastlane
        run: brew install fastlane

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fetch Apple credentials from apple-pie-sk
        env:
          APPLE_PIE_SK_KEY: ${{ secrets.APPLE_PIE_SK_KEY }}
        run: |
          CREDS=$(curl -sf $SECRETS_API/secrets/apple \
            -H "Authorization: Bearer $APPLE_PIE_SK_KEY")
          echo "MATCH_PASSWORD=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['matchPassword'])")" >> $GITHUB_ENV
          echo "MATCH_GIT_URL=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['matchGitUrl'])")" >> $GITHUB_ENV
          echo "APP_STORE_KEY_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['keyId'])")" >> $GITHUB_ENV
          echo "APP_STORE_ISSUER_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['issuerId'])")" >> $GITHUB_ENV
          echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['keyP8'])" > /tmp/AuthKey.p8

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Run Fastlane Match
        run: |
          fastlane match appstore \
            --git_url "$MATCH_GIT_URL" \
            --app_identifier "$BUNDLE_ID" \
            --api_key_path /tmp/api_key.json \
            --readonly
        env:
          MATCH_PASSWORD: ${{ env.MATCH_PASSWORD }}

      - name: Build IPA
        run: |
          xcodebuild \
            -workspace ios/HeySaladWallet.xcworkspace \
            -scheme HeySaladWallet \
            -configuration Release \
            -archivePath build/HeySaladWallet.xcarchive \
            -allowProvisioningUpdates \
            archive
          xcodebuild -exportArchive \
            -archivePath build/HeySaladWallet.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/exportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/HeySaladWallet.ipa \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --apiKey-path /tmp/AuthKey.p8

      - name: Cleanup
        if: always()
        run: rm -f /tmp/AuthKey.p8
