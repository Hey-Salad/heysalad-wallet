name: HeySalad Wallet - iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

env:
  SECRETS_API: https://apple-pie-sk.heysalad.app
  BUNDLE_ID: app.saladhr.heysalad-wallet
  SCHEME: HeySaladWallet
  WORKSPACE: ios/HeySaladWallet.xcworkspace
  TEAM_ID: A24823SWLS

jobs:
  build-simulator:
    name: Build (Simulator)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build for simulator
        run: |
          xcodebuild \
            -workspace $WORKSPACE \
            -scheme $SCHEME \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wallet-simulator-logs
          path: ~/Library/Logs/
          retention-days: 3

  build-release:
    name: Build & Upload to TestFlight
    runs-on: macos-14
    if: github.ref == 'refs/heads/main'
    needs: build-simulator
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Fetch Apple credentials from apple-pie-sk
        env:
          APPLE_PIE_SK_KEY: ${{ secrets.APPLE_PIE_SK_KEY }}
        run: |
          CREDS=$(curl -sf $SECRETS_API/secrets/apple \
            -H "Authorization: Bearer $APPLE_PIE_SK_KEY")
          echo "APP_STORE_KEY_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['keyId'])")" >> $GITHUB_ENV
          echo "APP_STORE_ISSUER_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['issuerId'])")" >> $GITHUB_ENV
          echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['keyP8'])" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

      - name: Archive app
        run: |
          xcodebuild archive \
            -workspace $WORKSPACE \
            -scheme $SCHEME \
            -configuration Release \
            -archivePath build/HeySaladWallet.xcarchive \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID" \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/HeySaladWallet.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/exportOptions.plist \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID" \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find build -name '*.ipa' | head -1)" \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --apiKey-path /tmp/AuthKey.p8

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeySaladWallet-ipa
          path: build/*.ipa
          retention-days: 7

      - name: Cleanup
        if: always()
        run: rm -f /tmp/AuthKey.p8
